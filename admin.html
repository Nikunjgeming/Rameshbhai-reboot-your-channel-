<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - CHEAP OTP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0e27;
            color: #fff;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 260px;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 20px;
            overflow-y: auto;
        }

        .sidebar .logo {
            font-size: 24px;
            font-weight: 800;
            text-align: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }

        .menu-item {
            padding: 12px 15px;
            margin: 5px 0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .menu-item:hover, .menu-item.active {
            background: rgba(78, 205, 196, 0.2);
        }

        .menu-item i {
            margin-right: 10px;
            color: #4ECDC4;
        }

        .main-content {
            margin-left: 260px;
            padding: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
        }

        .stat-card i {
            font-size: 32px;
            color: #4ECDC4;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        th {
            color: #4ECDC4;
        }

        .btn-sm {
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 0 2px;
        }

        .btn-approve {
            background: #4ECDC4;
            color: #0a0e27;
        }

        .btn-reject {
            background: #FF6B6B;
            color: white;
        }

        .hidden {
            display: none;
        }

        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 24px;
            width: 350px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div id="loginScreen" class="login-container">
        <div class="login-box">
            <h2 style="text-align:center; margin-bottom:30px;">Admin Login</h2>
            <div id="adminError" style="color:#FF6B6B; margin-bottom:15px;"></div>
            <input type="text" id="adminUsername" placeholder="Username">
            <input type="password" id="adminPassword" placeholder="Password">
            <button class="btn-sm btn-approve" style="width:100%; padding:12px;" onclick="adminLogin()">Login</button>
        </div>
    </div>

    <div id="adminPanel" class="hidden">
        <div class="sidebar">
            <div class="logo">
                <i class="fas fa-crown"></i> Admin Panel
            </div>
            <div class="menu-item active" onclick="showSection('dashboard')">
                <i class="fas fa-tachometer-alt"></i> Dashboard
            </div>
            <div class="menu-item" onclick="showSection('users')">
                <i class="fas fa-users"></i> Users
            </div>
            <div class="menu-item" onclick="showSection('deposits')">
                <i class="fas fa-money-bill"></i> Deposits
            </div>
            <div class="menu-item" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </div>
        </div>

        <div class="main-content">
            <div id="dashboardSection">
                <div class="stats-grid">
                    <div class="stat-card">
                        <i class="fas fa-users"></i>
                        <h3 id="totalUsers">0</h3>
                        <p>Total Users</p>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-money-bill-wave"></i>
                        <h3 id="totalDeposits">₹0</h3>
                        <p>Total Deposits</p>
                    </div>
                </div>
            </div>

            <div id="usersSection" class="hidden">
                <div class="card">
                    <h3>All Users</h3>
                    <div style="overflow-x:auto;">
                        <table id="usersTable">
                            <thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Balance</th></tr></thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="depositsSection" class="hidden">
                <div class="card">
                    <h3>Deposit Requests</h3>
                    <div style="overflow-x:auto;">
                        <table id="depositsTable">
                            <thead><tr><th>ID</th><th>User</th><th>Amount</th><th>Transaction ID</th><th>Status</th><th>Action</th></tr></thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function adminLogin() {
            const username = document.getElementById('adminUsername').value;
            const password = document.getElementById('adminPassword').value;
            
            if (username === 'nikunj_bhai' && password === 'Nikunj143') {
                localStorage.setItem('adminLoggedIn', 'true');
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                loadAllData();
            } else {
                document.getElementById('adminError').innerText = 'Invalid credentials!';
            }
        }

        function logout() {
            localStorage.removeItem('adminLoggedIn');
            location.reload();
        }

        function checkAdminAuth() {
            if (localStorage.getItem('adminLoggedIn') === 'true') {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                loadAllData();
            }
        }

        function showSection(section) {
            document.querySelectorAll('.main-content > div').forEach(div => div.classList.add('hidden'));
            document.getElementById(section + 'Section').classList.remove('hidden');
        }

        async function loadAllData() {
            await loadUsers();
            await loadDeposits();
            await loadStats();
        }

        async function loadUsers() {
            try {
                const response = await fetch('/api/?action=getAllUsers');
                const data = await response.json();
                if (data.success) {
                    const tbody = document.querySelector('#usersTable tbody');
                    tbody.innerHTML = data.users.map(user => `
                        <tr><td>${user.id}</td><td>${user.name || '-'}</td><td>${user.email}</td><td>₹${user.balance || 0}</td></tr>
                    `).join('');
                    document.getElementById('totalUsers').innerText = data.users.length;
                }
            } catch (error) {
                console.error('Error loading users:', error);
            }
        }

        async function loadDeposits() {
            try {
                const response = await fetch('/api/?action=getAllDeposits');
                const data = await response.json();
                if (data.success) {
                    const tbody = document.querySelector('#depositsTable tbody');
                    tbody.innerHTML = data.deposits.map(deposit => `
                        <tr>
                            <td>${deposit.id}</td>
                            <td>${deposit.user_email}</td>
                            <td>₹${deposit.amount}</td>
                            <td>${deposit.transaction_id}</td>
                            <td>${deposit.status}</td>
                            <td>
                                ${deposit.status === 'pending' ? `
                                    <button class="btn-sm btn-approve" onclick="approveDeposit(${deposit.id})">Approve</button>
                                    <button class="btn-sm btn-reject" onclick="rejectDeposit(${deposit.id})">Reject</button>
                                ` : '-'}
                            </td>
                        </tr>
                    `).join('');
                }
            } catch (error) {
                console.error('Error loading deposits:', error);
            }
        }

        async function loadStats() {
            try {
                const response = await fetch('/api/?action=getStats');
                const data = await response.json();
                if (data.success) {
                    document.getElementById('totalDeposits').innerText = `₹${data.total_deposits || 0}`;
                }
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        async function approveDeposit(id) {
            await fetch(`/api/?action=approveDeposit&id=${id}`);
            loadDeposits();
            loadUsers();
            alert('Deposit approved!');
        }

        async function rejectDeposit(id) {
            await fetch(`/api/?action=rejectDeposit&id=${id}`);
            loadDeposits();
            alert('Deposit rejected!');
        }

        checkAdminAuth();
    </script>
</body>
</html>
